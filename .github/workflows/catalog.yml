name: Validate theme catalog

on:
  pull_request:
    paths:
      - "catalog/**"
      - "spec/**"
      - "tools/**"
      - "lib/**"
      - "components/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/catalog.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run catalog:check
      - run: npm run lint
      - run: npm test
      - run: npm run build:pages
        env:
          BUILD_GITHUB_PAGES: "true"
          NEXT_PUBLIC_SITE_URL: https://lixiaobaivv.github.io/Codex-Skin-Store/
